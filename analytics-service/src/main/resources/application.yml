server:
  port: 8084

spring:
  application:
    name: analytics-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  jackson:
    serialization:
      indent_output: true
  mongodb:
    uri: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@localhost:27017/analytics_db?authSource=admin

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
