server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: account-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/accounts/**

            - id: transaction-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/transactions/**

            - id: analytics-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/analytics/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
