server:
  port: 8083

spring:
  application:
    name: transaction-service
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5434/transaction_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # depois: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  jackson:
    serialization:
      indent_output: true

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
