apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: financial-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: ACCOUNT_SERVICE_URL
              value: http://account-service:8082
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service:8083
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:8084
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 768Mi
              cpu: 750m
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: financial-dashboard
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
